name: Weekly Evidence Aggregator

on:
  schedule:
    - cron: '0 3 * * 0' # every Sunday at 03:00 UTC
  workflow_dispatch: {}

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Aggregate weekly notes
        run: |
          WEEK=$(date -d "last sunday" +%V)
          YEAR=$(date -d "last sunday" +%Y)
          python3 scripts/aggregate_weekly.py --year $YEAR --week $WEEK
      - name: Generate readiness report
        run: |
          WEEK=$(date -d "last sunday" +%V)
          YEAR=$(date -d "last sunday" +%Y)
          python3 scripts/generate_readiness_report.py --year $YEAR --week $WEEK || echo "Readiness report skipped (no notes found)"
      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ evidence/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update weekly report and readiness summary for ${YEAR}-W${WEEK}"
            git push
          fi
