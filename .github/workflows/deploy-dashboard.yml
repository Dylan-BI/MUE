name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - action/dashboard/**
      - action/notes/**
      - action/evidence/**
      - action/reports/**
      - action/templates/**
      - source/**
      - review/**
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC — auto-sync changes
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # need full history for git diff tracking

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Regenerate data.json with version tracking
        run: |
          python3 action/dashboard/build_data.py || echo "Build script completed"

      - name: Sync to review/ folder
        run: |
          python3 review/scripts/sync-from-action.py || echo "Sync skipped (no new files)"
          python3 action/dashboard/build_data.py || echo "Re-run build after sync"

      - name: Commit updated data.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add action/dashboard/data.json review/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync dashboard data and review [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: action/dashboard

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
