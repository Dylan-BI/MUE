name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - action/dashboard/**
      - action/notes/**
      - action/evidence/**
      - action/reports/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Regenerate data.json from notes
        run: |
          python3 action/dashboard/build_data.py || echo "No notes yet — using existing data.json"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: action/dashboard

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
